app = "namozbot"
primary_region = "iad"

[build]
  builder = "paketobuildpacks/builder:base"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  app = "python bot.py"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
