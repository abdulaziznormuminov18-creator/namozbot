# fly.toml app configuration file generated for namozbot on 2026-06-07T17:03:58Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'namozbot'
primary_region = 'arn'

[build]

[processes]
  app = 'python bot.py'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
